<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감정 우주 — Emotion Universe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ── 전환 오버레이 ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #overlay.fade { opacity: 1; }

    /* ── 입력 패널 ── */
    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 460px;
      max-width: 95vw;
      background: rgba(8, 8, 24, 0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 40px;
      color: #fff;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transition: opacity 0.5s, transform 0.5s;
    }
    #panel.hide {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 16px));
      pointer-events: none;
    }

    #panel h1 {
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #c084fc, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 11px 15px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s;
    }
    input:focus { border-color: rgba(192,132,252,0.6); }
    input::placeholder { color: rgba(255,255,255,0.22); }

    /* 프리셋 */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .chip {
      padding: 4px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65);
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .chip:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }

    /* 버튼 */
    #genBtn {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }
    #genBtn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
    }
    #genBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errMsg {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #f87171;
      display: none;
      text-align: center;
    }

    /* ── 설명 카드 (하단) ── */
    #infoCard {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      max-width: 620px;
      width: 90vw;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 22px;
      color: #fff;
      text-align: center;
      display: none;
      opacity: 0;
      transition: opacity 0.6s;
    }
    #infoCard.show { display: block; }
    #infoCard.visible { opacity: 1; }
    #themeName {
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 5px;
    }
    #descText { font-size: 0.95rem; color: rgba(255,255,255,0.82); line-height: 1.5; }

    /* ── 설정 버튼 (우상단) ── */
    #settingsBtn {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 20;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 40px;
      padding: 7px 16px;
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    #settingsBtn:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

<canvas id="universe"></canvas>
<div id="overlay"></div>

<!-- 입력 패널 -->
<div id="panel">
  <h1>✦ 감정 우주</h1>
  <p class="subtitle">당신의 감정을 우주로 표현합니다</p>

  <div class="field">
    <label>지금 어떤 감정인가요?</label>
    <input type="text" id="emotion" placeholder="예: 행복해, 슬프다, 설레, 화가 나..." />
    <div class="presets">
      <span class="chip" data-e="행복해">😊 행복</span>
      <span class="chip" data-e="슬퍼">😢 슬픔</span>
      <span class="chip" data-e="화가 나">😠 분노</span>
      <span class="chip" data-e="설레">💓 설렘</span>
      <span class="chip" data-e="평온해">😌 평온</span>
      <span class="chip" data-e="외로워">🌙 외로움</span>
      <span class="chip" data-e="불안해">😰 불안</span>
      <span class="chip" data-e="사랑에 빠졌어">❤️ 사랑</span>
      <span class="chip" data-e="희망차">🌟 희망</span>
      <span class="chip" data-e="공허해">🕳️ 공허</span>
    </div>
  </div>

  <button id="genBtn">🚀 우주 생성하기</button>
  <div id="errMsg"></div>
</div>

<!-- 하단 설명 -->
<div id="infoCard">
  <div id="themeName"></div>
  <div id="descText"></div>
</div>

<!-- 설정 토글 -->
<button id="settingsBtn">⚙ 설정</button>

<script>
// ═══════════════════════════════════════════════════════════
//  캔버스 초기화
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('universe');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (currentParams) rebuildScene(currentParams);
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════
//  유틸
// ═══════════════════════════════════════════════════════════
function hexRgba(hex, a) {
  if (!hex || hex.length < 7) return `rgba(255,255,255,${a})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

// ═══════════════════════════════════════════════════════════
//  별 (Star)
// ═══════════════════════════════════════════════════════════
class Star {
  constructor(p) {
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.r    = rand(0.3, p.particleSize);
    this.maxA = rand(0.2, p.starBrightness);
    this.ph   = rand(0, Math.PI * 2);
    this.spd  = rand(0.006, 0.02) * p.starTwinkleSpeed;
    this.col  = Math.random() < 0.65 ? p.primaryColor : p.accentColor;
  }
  update() {
    this.ph += this.spd;
    this.a = this.maxA * (0.35 + 0.65 * Math.abs(Math.sin(this.ph)));
  }
  draw() {
    // 글로우
    const glowR = this.r * 4;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    g.addColorStop(0, hexRgba(this.col, this.a * 0.6));
    g.addColorStop(1, hexRgba(this.col, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    // 코어
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = hexRgba(this.col, Math.min(this.a * 2.2, 1));
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
//  성운 (Nebula)
// ═══════════════════════════════════════════════════════════
class Nebula {
  constructor(p) {
    this.x   = rand(0, W);
    this.y   = rand(0, H);
    this.rx  = p.nebulaSize * rand(0.5, 1.2);
    this.ry  = this.rx * rand(0.45, 0.85);
    this.rot = rand(0, Math.PI);
    this.maxA = p.nebulaOpacity * rand(0.5, 1.0);
    this.ph  = rand(0, Math.PI * 2);
    this.spd = rand(0.002, 0.008);
    this.c0  = p.primaryColor;
    this.c1  = p.secondaryColor;
    this.c2  = p.accentColor;
    this.type = randInt(0, 2); // 성운 스타일 3종
  }
  update() { this.ph += this.spd; }
  draw() {
    const a = this.maxA * (0.75 + 0.25 * Math.sin(this.ph));
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(1, this.ry / this.rx);

    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, this.rx);
    if (this.type === 0) {
      g.addColorStop(0,   hexRgba(this.c0, a));
      g.addColorStop(0.4, hexRgba(this.c1, a * 0.55));
      g.addColorStop(0.75,hexRgba(this.c2, a * 0.2));
      g.addColorStop(1,   hexRgba(this.c2, 0));
    } else if (this.type === 1) {
      g.addColorStop(0,   hexRgba(this.c2, a * 0.9));
      g.addColorStop(0.35,hexRgba(this.c0, a * 0.45));
      g.addColorStop(0.7, hexRgba(this.c1, a * 0.15));
      g.addColorStop(1,   hexRgba(this.c1, 0));
    } else {
      g.addColorStop(0,   hexRgba(this.c1, a * 0.7));
      g.addColorStop(0.5, hexRgba(this.c2, a * 0.35));
      g.addColorStop(0.8, hexRgba(this.c0, a * 0.1));
      g.addColorStop(1,   hexRgba(this.c0, 0));
    }

    ctx.beginPath();
    ctx.arc(0, 0, this.rx, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
//  별똥별 (ShootingStar)
// ═══════════════════════════════════════════════════════════
class ShootingStar {
  constructor(p) {
    this.p = p;
    this.active = false;
    this.trail  = [];
  }
  activate() {
    // 상단 또는 좌측에서 출발
    if (Math.random() < 0.55) {
      this.x = rand(0, W);
      this.y = rand(-20, -5);
    } else {
      this.x = rand(-20, -5);
      this.y = rand(0, H * 0.65);
    }
    this.angle = Math.PI / 4 + rand(-0.5, 0.5);
    this.spd   = this.p.shootingStarSpeed * rand(0.7, 1.3);
    this.maxTr = Math.floor(this.p.shootingStarTrail * rand(0.6, 1.2));
    this.trail = [];
    this.active = true;
  }
  update() {
    if (!this.active) return;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTr) this.trail.shift();
    this.x += Math.cos(this.angle) * this.spd;
    this.y += Math.sin(this.angle) * this.spd;
    if (this.x > W + 60 || this.y > H + 60) {
      this.active = false;
      this.trail  = [];
    }
  }
  draw() {
    if (!this.active || this.trail.length < 2) return;
    // 꼬리
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = hexRgba(this.p.accentColor, t * 0.85);
      ctx.lineWidth   = t * 2.8;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }
    // 헤드 글로우
    const hg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 9);
    hg.addColorStop(0, hexRgba(this.p.accentColor, 1));
    hg.addColorStop(1, hexRgba(this.p.accentColor, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, 9, 0, Math.PI * 2);
    ctx.fillStyle = hg;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
//  씬 상태
// ═══════════════════════════════════════════════════════════
let currentParams  = null;
let stars          = [];
let nebulae        = [];
let shootingStars  = [];

function rebuildScene(p) {
  currentParams = p;
  stars         = Array.from({ length: Math.round(p.starCount) },  () => new Star(p));
  nebulae       = Array.from({ length: Math.round(p.nebulaCount) }, () => new Nebula(p));
  shootingStars = Array.from({ length: 10 }, () => new ShootingStar(p));
}

// ── 기본 씬 (API 호출 전) ──────────────────────────────────
rebuildScene({
  backgroundColor: '#04040f',
  primaryColor:    '#7788aa',
  secondaryColor:  '#223355',
  accentColor:     '#99bbdd',
  starCount:       180,
  starBrightness:  0.45,
  starTwinkleSpeed:0.5,
  nebulaCount:     3,
  nebulaOpacity:   0.1,
  nebulaSize:      170,
  shootingStarFrequency: 0.0018,
  shootingStarSpeed:     5,
  shootingStarTrail:     22,
  animationSpeed:  0.7,
  particleSize:    1.4
});

// ═══════════════════════════════════════════════════════════
//  애니메이션 루프
// ═══════════════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  if (!currentParams) return;

  ctx.fillStyle = currentParams.backgroundColor;
  ctx.fillRect(0, 0, W, H);

  nebulae.forEach(n => { n.update(); n.draw(); });
  stars.forEach(s   => { s.update(); s.draw(); });

  const freq = currentParams.shootingStarFrequency * currentParams.animationSpeed;
  shootingStars.forEach(ss => {
    if (!ss.active && Math.random() < freq) ss.activate();
    ss.update();
    ss.draw();
  });
}
loop();

// ═══════════════════════════════════════════════════════════
//  Anthropic API 호출
// ═══════════════════════════════════════════════════════════
async function callAPI(emotion) {
  const res = await fetch('/api/generate-universe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emotion })
  });

  if (!res.ok) {
    let msg = `API 오류 (${res.status})`;
    try { msg = (await res.json()).error || msg; } catch(_) {}
    throw new Error(msg);
  }

  return await res.json();
}

// ═══════════════════════════════════════════════════════════
//  UI 제어
// ═══════════════════════════════════════════════════════════
const panel      = document.getElementById('panel');
const genBtn     = document.getElementById('genBtn');
const errMsg     = document.getElementById('errMsg');
const infoCard   = document.getElementById('infoCard');
const overlay    = document.getElementById('overlay');
const settingsBtn= document.getElementById('settingsBtn');

function showErr(msg) {
  errMsg.textContent = msg;
  errMsg.style.display = 'block';
}
function hideErr() { errMsg.style.display = 'none'; }

let panelOpen = true;
function togglePanel() {
  panelOpen = !panelOpen;
  panel.classList.toggle('hide', !panelOpen);
  settingsBtn.textContent = panelOpen ? '✕ 닫기' : '⚙ 설정';
}

settingsBtn.addEventListener('click', togglePanel);

// 칩 클릭
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('emotion').value = chip.dataset.e;
  });
});

// Enter 키
document.getElementById('emotion').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

async function generate() {
  const emotion = document.getElementById('emotion').value.trim();

  if (!emotion) { showErr('감정을 입력해주세요.'); return; }

  hideErr();
  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="spinner"></span>우주를 생성하는 중...';

  try {
    const params = await callAPI(emotion);

    // 페이드 전환
    overlay.classList.add('fade');
    await new Promise(r => setTimeout(r, 600));

    rebuildScene(params);

    overlay.classList.remove('fade');

    // 설명 카드 표시
    document.getElementById('themeName').textContent = params.theme || '';
    document.getElementById('descText').textContent  = params.description || '';
    infoCard.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => infoCard.classList.add('visible')));

    // 패널 닫기
    panel.classList.add('hide');
    panelOpen = false;
    settingsBtn.style.display = 'block';
    settingsBtn.textContent = '⚙ 설정';

  } catch(e) {
    showErr(e.message || '알 수 없는 오류가 발생했습니다.');
  } finally {
    genBtn.disabled = false;
    genBtn.innerHTML = '🚀 우주 생성하기';
  }
}

document.getElementById('genBtn').addEventListener('click', generate);
</script>
</body>
</html>
