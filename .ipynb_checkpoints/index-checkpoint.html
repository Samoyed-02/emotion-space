<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      padding: 20px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 36px;
    }

    button#generate {
      padding: 14px 48px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 210, 0, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button#generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255, 210, 0, 0.6);
    }

    button#generate:active {
      transform: translateY(0);
    }

    #results {
      margin-top: 40px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .row {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row-label {
      font-size: 0.85rem;
      color: #aaa;
      min-width: 40px;
      font-weight: bold;
    }

    .balls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.3);
    }

    /* 번호대별 색상 (한국 로또 기준) */
    .c1  { background: radial-gradient(circle at 35% 35%, #ffd966, #f4b400); } /* 1~10  노랑 */
    .c11 { background: radial-gradient(circle at 35% 35%, #6fc3ff, #1a7ad4); } /* 11~20 파랑 */
    .c21 { background: radial-gradient(circle at 35% 35%, #ff8a8a, #d93b3b); } /* 21~30 빨강 */
    .c31 { background: radial-gradient(circle at 35% 35%, #bdbdbd, #6e6e6e); } /* 31~40 회색 */
    .c41 { background: radial-gradient(circle at 35% 35%, #9be89b, #3a9d3a); } /* 41~45 초록 */
  </style>
</head>
<body>
  <h1>🎱 로또 번호 추천기</h1>
  <p class="subtitle">버튼을 누르면 행운의 번호 5세트를 추천해드립니다!</p>

  <button id="generate" onclick="generateLotto()">번호 추천받기</button>

  <div id="results"></div>

  <script>
    function pickNumbers() {
      const pool = Array.from({ length: 45 }, (_, i) => i + 1);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, 6).sort((a, b) => a - b);
    }

    function ballClass(n) {
      if (n <= 10)  return 'c1';
      if (n <= 20)  return 'c11';
      if (n <= 30)  return 'c21';
      if (n <= 40)  return 'c31';
      return 'c41';
    }

    function generateLotto() {
      const container = document.getElementById('results');
      container.innerHTML = '';

      for (let i = 1; i <= 5; i++) {
        const numbers = pickNumbers();
        const delay = (i - 1) * 80;

        const row = document.createElement('div');
        row.className = 'row';
        row.style.animationDelay = delay + 'ms';

        const label = document.createElement('div');
        label.className = 'row-label';
        label.textContent = i + '세트';

        const balls = document.createElement('div');
        balls.className = 'balls';

        numbers.forEach(n => {
          const ball = document.createElement('div');
          ball.className = 'ball ' + ballClass(n);
          ball.textContent = n;
          balls.appendChild(ball);
        });

        row.appendChild(label);
        row.appendChild(balls);
        container.appendChild(row);
      }
    }
  </script>
</body>
</html>
