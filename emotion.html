<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>к°җм • мҡ°мЈј вҖ” Emotion Universe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* в”Җв”Җ м „нҷҳ мҳӨлІ„л Ҳмқҙ в”Җв”Җ */
    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #overlay.fade { opacity: 1; }

    /* в”Җв”Җ мһ…л Ҙ нҢЁл„җ в”Җв”Җ */
    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 460px;
      max-width: 95vw;
      background: rgba(8, 8, 24, 0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 40px;
      color: #fff;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transition: opacity 0.5s, transform 0.5s;
    }
    #panel.hide {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 16px));
      pointer-events: none;
    }

    #panel h1 {
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #c084fc, #60a5fa, #34d399);

    .subtitle {

      color: rgba(255,255,255,0.45);

    }

    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.72rem;

    input {

    }

    /* н”„лҰ¬м…Ӣ */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .chip {
      padding: 4px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65);
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .chip:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }

    /* лІ„нҠј */
    #genBtn {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }
    #genBtn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
    }
    #genBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errMsg {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #f87171;
      display: none;
      text-align: center;
    }

    /* в”Җв”Җ м„ӨлӘ… м№ҙл“ң (н•ҳлӢЁ) в”Җв”Җ */
    #infoCard {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      max-width: 620px;
      width: 90vw;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 22px;
      color: #fff;
      text-align: center;
      display: none;
      opacity: 0;
      transition: opacity 0.6s;
    }
    #infoCard.show { display: block; }
    #infoCard.visible { opacity: 1; }
    #themeName {
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 5px;
    }
    #descText { font-size: 0.95rem; color: rgba(255,255,255,0.82); line-height: 1.5; }

    /* в”Җв”Җ м„Өм • лІ„нҠј (мҡ°мғҒлӢЁ) в”Җв”Җ */
    #settingsBtn {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 20;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 40px;
      padding: 7px 16px;
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    #settingsBtn:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

<canvas id="universe"></canvas>
<div id="overlay"></div>

<!-- мһ…л Ҙ нҢЁл„җ -->
<div id="panel">
  <h1>вңҰ к°җм • мҡ°мЈј</h1>
  <p class="subtitle">лӢ№мӢ мқҳ к°җм •мқ„ мҡ°мЈјлЎң н‘ңнҳ„н•©лӢҲлӢӨ</p>

  <div class="field">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
  </div>

  <div class="field">
    <label>м§ҖкёҲ м–ҙл–Ө к°җм •мқёк°Җмҡ”?</label>
    <input type="text" id="emotion" placeholder="мҳҲ: н–үліөн•ҙ, мҠ¬н”„лӢӨ, м„Өл Ҳ, нҷ”к°Җ лӮҳ..." />
    <div class="presets">
      <span class="chip" data-e="н–үліөн•ҙ">рҹҳҠ н–үліө</span>
      <span class="chip" data-e="мҠ¬нҚј">рҹҳў мҠ¬н””</span>
      <span class="chip" data-e="нҷ”к°Җ лӮҳ">рҹҳ  л¶„л…ё</span>
      <span class="chip" data-e="м„Өл Ҳ">рҹ’“ м„Өл ҳ</span>
      <span class="chip" data-e="нҸүмҳЁн•ҙ">рҹҳҢ нҸүмҳЁ</span>
      <span class="chip" data-e="мҷёлЎңмӣҢ">рҹҢҷ мҷёлЎңмӣҖ</span>
      <span class="chip" data-e="л¶Ҳм•Ҳн•ҙ">рҹҳ° л¶Ҳм•Ҳ</span>
      <span class="chip" data-e="мӮ¬лһ‘м—җ л№ мЎҢм–ҙ">вқӨпёҸ мӮ¬лһ‘</span>
      <span class="chip" data-e="нқ¬л§қм°Ё">рҹҢҹ нқ¬л§қ</span>

  </div>

  <button id="genBtn">рҹҡҖ мҡ°мЈј мғқм„ұн•ҳкё°</button>
  <div id="errMsg"></div>
</div>

<!-- н•ҳлӢЁ м„ӨлӘ… -->
<div id="infoCard">
  <div id="themeName"></div>
  <div id="descText"></div>
</div>

<!-- м„Өм • нҶ кёҖ -->
<button id="settingsBtn">вҡҷ м„Өм •</button>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  мә”лІ„мҠӨ мҙҲкё°нҷ”
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const canvas = document.getElementById('universe');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (currentParams) rebuildScene(currentParams);
}
window.addEventListener('resize', resize);
resize();

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  мң нӢё
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function hexRgba(hex, a) {
  if (!hex || hex.length < 7) return `rgba(255,255,255,${a})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  лі„ (Star)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
class Star {
  constructor(p) {
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.r    = rand(0.3, p.particleSize);
    this.maxA = rand(0.2, p.starBrightness);
    this.ph   = rand(0, Math.PI * 2);
    this.spd  = rand(0.006, 0.02) * p.starTwinkleSpeed;
    this.col  = Math.random() < 0.65 ? p.primaryColor : p.accentColor;
  }
  update() {
    this.ph += this.spd;
    this.a = this.maxA * (0.35 + 0.65 * Math.abs(Math.sin(this.ph)));
  }
  draw() {
    // кёҖлЎңмҡ°
    const glowR = this.r * 4;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    g.addColorStop(0, hexRgba(this.col, this.a * 0.6));
    g.addColorStop(1, hexRgba(this.col, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    // мҪ”м–ҙ
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = hexRgba(this.col, Math.min(this.a * 2.2, 1));
    ctx.fill();
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  м„ұмҡҙ (Nebula)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
class Nebula {
  constructor(p) {
    this.x   = rand(0, W);
    this.y   = rand(0, H);
    this.rx  = p.nebulaSize * rand(0.5, 1.2);
    this.ry  = this.rx * rand(0.45, 0.85);
    this.rot = rand(0, Math.PI);
    this.maxA = p.nebulaOpacity * rand(0.5, 1.0);
    this.ph  = rand(0, Math.PI * 2);
    this.spd = rand(0.002, 0.008);
    this.c0  = p.primaryColor;
    this.c1  = p.secondaryColor;
    this.c2  = p.accentColor;
    this.type = randInt(0, 2); // м„ұмҡҙ мҠӨнғҖмқј 3мў…
  }
  update() { this.ph += this.spd; }
  draw() {
    const a = this.maxA * (0.75 + 0.25 * Math.sin(this.ph));
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(1, this.ry / this.rx);

    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, this.rx);
    if (this.type === 0) {
      g.addColorStop(0,   hexRgba(this.c0, a));
      g.addColorStop(0.4, hexRgba(this.c1, a * 0.55));
      g.addColorStop(0.75,hexRgba(this.c2, a * 0.2));
      g.addColorStop(1,   hexRgba(this.c2, 0));
    } else if (this.type === 1) {
      g.addColorStop(0,   hexRgba(this.c2, a * 0.9));
      g.addColorStop(0.35,hexRgba(this.c0, a * 0.45));
      g.addColorStop(0.7, hexRgba(this.c1, a * 0.15));
      g.addColorStop(1,   hexRgba(this.c1, 0));
    } else {
      g.addColorStop(0,   hexRgba(this.c1, a * 0.7));
      g.addColorStop(0.5, hexRgba(this.c2, a * 0.35));
      g.addColorStop(0.8, hexRgba(this.c0, a * 0.1));
      g.addColorStop(1,   hexRgba(this.c0, 0));
    }

    ctx.beginPath();
    ctx.arc(0, 0, this.rx, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  лі„лҳҘлі„ (ShootingStar)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
class ShootingStar {
  constructor(p) {
    this.p = p;
    this.active = false;
    this.trail  = [];
  }
  activate() {
    // мғҒлӢЁ лҳҗлҠ” мўҢмёЎм—җм„ң м¶ңл°ң
    if (Math.random() < 0.55) {
      this.x = rand(0, W);
      this.y = rand(-20, -5);
    } else {
      this.x = rand(-20, -5);
      this.y = rand(0, H * 0.65);
    }
    this.angle = Math.PI / 4 + rand(-0.5, 0.5);
    this.spd   = this.p.shootingStarSpeed * rand(0.7, 1.3);
    this.maxTr = Math.floor(this.p.shootingStarTrail * rand(0.6, 1.2));
    this.trail = [];
    this.active = true;
  }
  update() {
    if (!this.active) return;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTr) this.trail.shift();
    this.x += Math.cos(this.angle) * this.spd;
    this.y += Math.sin(this.angle) * this.spd;
    if (this.x > W + 60 || this.y > H + 60) {
      this.active = false;
      this.trail  = [];
    }
  }
  draw() {
    if (!this.active || this.trail.length < 2) return;
    // кј¬лҰ¬
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = hexRgba(this.p.accentColor, t * 0.85);
      ctx.lineWidth   = t * 2.8;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }
    // н—Өл“ң кёҖлЎңмҡ°
    const hg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 9);
    hg.addColorStop(0, hexRgba(this.p.accentColor, 1));
    hg.addColorStop(1, hexRgba(this.p.accentColor, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, 9, 0, Math.PI * 2);
    ctx.fillStyle = hg;
    ctx.fill();
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  м”¬ мғҒнғң
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let currentParams  = null;
let stars          = [];
let nebulae        = [];
let shootingStars  = [];

function rebuildScene(p) {
  currentParams = p;
  stars         = Array.from({ length: Math.round(p.starCount) },  () => new Star(p));
  nebulae       = Array.from({ length: Math.round(p.nebulaCount) }, () => new Nebula(p));
  shootingStars = Array.from({ length: 10 }, () => new ShootingStar(p));
}

// в”Җв”Җ кё°ліё м”¬ (API нҳём¶ң м „) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
rebuildScene({
  backgroundColor: '#04040f',
  primaryColor:    '#7788aa',
  secondaryColor:  '#223355',
  accentColor:     '#99bbdd',
  starCount:       180,
  starBrightness:  0.45,
  starTwinkleSpeed:0.5,
  nebulaCount:     3,
  nebulaOpacity:   0.1,
  nebulaSize:      170,
  shootingStarFrequency: 0.0018,
  shootingStarSpeed:     5,
  shootingStarTrail:     22,
  animationSpeed:  0.7,
  particleSize:    1.4
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  м• лӢҲл©”мқҙм…ҳ лЈЁн”„
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function loop() {
  requestAnimationFrame(loop);
  if (!currentParams) return;

  ctx.fillStyle = currentParams.backgroundColor;
  ctx.fillRect(0, 0, W, H);

  nebulae.forEach(n => { n.update(); n.draw(); });
  stars.forEach(s   => { s.update(); s.draw(); });

  const freq = currentParams.shootingStarFrequency * currentParams.animationSpeed;
  shootingStars.forEach(ss => {
    if (!ss.active && Math.random() < freq) ss.activate();
    ss.update();
    ss.draw();
  });
}
loop();

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  Anthropic API нҳём¶ң
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function callAPI(emotion, apiKey) {
  const prompt = `лӢ№мӢ мқҖ к°җм •мқ„ мҡ°мЈј мӢңк°Ғнҷ” нҢҢлқјлҜён„°лЎң ліҖнҷҳн•ҳлҠ” м „л¬ёк°Җмһ…лӢҲлӢӨ.

мӮ¬мҡ©мһҗ к°җм •: "${emotion}"

мқҙ к°җм •м—җ мҷ„лІҪн•ҳкІҢ м–ҙмҡёлҰ¬лҠ” мҡ°мЈј м• лӢҲл©”мқҙм…ҳ нҢҢлқјлҜён„°лҘј JSONмңјлЎңл§Ң л°ҳнҷҳн•ҳм„ёмҡ”.
мҪ”л“ңлё”лЎқ(\`\`\`) м—Ҷмқҙ мҲңмҲҳ JSON к°қмІҙл§Ң л°ҳнҷҳн•ҳм„ёмҡ”.

{
  "theme": "к°җм • н…Ңл§Ҳ мқҙлҰ„(н•ңкөӯм–ҙ)",
  "description": "мқҙ мҡ°мЈјм—җ лҢҖн•ң мӢңм Ғмқҙкі  к°җм„ұм Ғмқё м„ӨлӘ…(н•ңкөӯм–ҙ, 1~2л¬ёмһҘ)",
  "backgroundColor": "#rrggbb (м–ҙл‘җмҡҙ л°°кІҪмғү)",
  "primaryColor":    "#rrggbb (лі„ мЈјмғүмғҒ)",
  "secondaryColor":  "#rrggbb (м„ұмҡҙ ліҙмЎ°мғү)",
  "accentColor":     "#rrggbb (лі„лҳҘлі„В·к°•мЎ°, л°қкі  м„ лӘ…н•ҳкІҢ)",
  "starCount":       100~500 мӮ¬мқҙ м •мҲҳ,
  "starBrightness":  0.3~1.0,
  "starTwinkleSpeed":0.3~2.0,
  "nebulaCount":     2~7 мӮ¬мқҙ м •мҲҳ,
  "nebulaOpacity":   0.1~0.65,
  "nebulaSize":      80~360,
  "shootingStarFrequency": 0.001~0.025,
  "shootingStarSpeed":     2~14,
  "shootingStarTrail":     10~55 м •мҲҳ,
  "animationSpeed":  0.3~2.2,
  "particleSize":    0.7~3.0
}

к°җм •лі„ к°Җмқҙл“ң:
вҖў н–үліөВ·кё°мҒЁ вҶ’ нҷ©кёҲВ·л…ёлһ‘, starCountвҶ‘, shootingStarFrequencyвҶ‘, animationSpeedвҶ‘
вҖў мҠ¬н””В·мҡ°мҡё вҶ’ м§ҷмқҖ нҢҢлһ‘В·лӮЁмғү, starBrightnessвҶ“, shootingStarFrequencyвҶ“, animationSpeedвҶ“
вҖў л¶„л…ёВ·нҷ”   вҶ’ л№Ёк°•В·мЈјнҷ©, shootingStarSpeedвҶ‘, shootingStarFrequencyвҶ‘, к°•л ¬
вҖў м„Өл ҳВ·мӮ¬лһ‘ вҶ’ н•‘нҒ¬В·лқјлІӨлҚ”, л°ҳм§қмһ„вҶ‘, starCountвҶ‘, shootingStarFrequency мӨ‘к°„вҶ‘
вҖў нҸүмҳЁВ·м•Ҳм • вҶ’ мІӯлЎқВ·лҜјнҠё, animationSpeedвҶ“, л¶Җл“ңлҹ¬мӣҖ, nebulaOpacityвҶ‘
вҖў л¶Ҳм•ҲВ·кіөнҸ¬ вҶ’ ліҙлқјВ·кІҖм •, starBrightness лӮ®кі  л¶Ҳк·ңм№ҷ, animationSpeed л№ лҰ„
вҖў мҷёлЎңмӣҖ    вҶ’ м§ҷмқҖ лӮЁмғү, starCountвҶ“, shootingStarFrequencyвҶ“, кі мҡ”
вҖў нқ¬л§қ      вҶ’ м—°ліҙлқјВ·н•ҳлҠҳ, starCountвҶ‘, accentColor л°қмқҢ
вҖў кіөн—Ҳ      вҶ’ л§Өмҡ° м–ҙл‘җмҡҙ нҡҢмғүВ·кІҖм •, starCountвҶ“, nebulaOpacity л§Өмҡ° лӮ®мқҢ`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    let msg = `API мҳӨлҘҳ (${res.status})`;
    try { msg = (await res.json()).error?.message || msg; } catch(_) {}
    throw new Error(msg);
  }

  const data  = await res.json();
  const text  = data.content[0].text.trim();
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('мқ‘лӢө нҢҢмӢұ мӢӨнҢЁ вҖ” JSONмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
  return JSON.parse(match[0]);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  UI м ңм–ҙ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const panel      = document.getElementById('panel');
const genBtn     = document.getElementById('genBtn');
const errMsg     = document.getElementById('errMsg');
const infoCard   = document.getElementById('infoCard');
const overlay    = document.getElementById('overlay');
const settingsBtn= document.getElementById('settingsBtn');

function showErr(msg) {
  errMsg.textContent = msg;
  errMsg.style.display = 'block';
}
function hideErr() { errMsg.style.display = 'none'; }

let panelOpen = true;
function togglePanel() {
  panelOpen = !panelOpen;
  panel.classList.toggle('hide', !panelOpen);
  settingsBtn.textContent = panelOpen ? 'вң• лӢ«кё°' : 'вҡҷ м„Өм •';
}

settingsBtn.addEventListener('click', togglePanel);

// м№© нҒҙлҰӯ
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('emotion').value = chip.dataset.e;
  });
});

// Enter нӮӨ
document.getElementById('emotion').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

async function generate() {
  const emotion = document.getElementById('emotion').value.trim();
  const apiKey  = document.getElementById('apiKey').value.trim();

  if (!apiKey)  { showErr('API нӮӨлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }
  if (!emotion) { showErr('к°җм •мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

  hideErr();
  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="spinner"></span>мҡ°мЈјлҘј мғқм„ұн•ҳлҠ” мӨ‘...';

  try {
    const params = await callAPI(emotion, apiKey);

    // нҺҳмқҙл“ң м „нҷҳ
    overlay.classList.add('fade');
    await new Promise(r => setTimeout(r, 600));

    rebuildScene(params);

    overlay.classList.remove('fade');

    // м„ӨлӘ… м№ҙл“ң н‘ңмӢң
    document.getElementById('themeName').textContent = params.theme || '';
    document.getElementById('descText').textContent  = params.description || '';
    infoCard.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => infoCard.classList.add('visible')));

    // нҢЁл„җ лӢ«кё°
    panel.classList.add('hide');
    panelOpen = false;
    settingsBtn.style.display = 'block';
    settingsBtn.textContent = 'вҡҷ м„Өм •';

  } catch(e) {
    showErr(e.message || 'м•Ң мҲҳ м—ҶлҠ” мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.');
  } finally {
    genBtn.disabled = false;
    genBtn.innerHTML = 'рҹҡҖ мҡ°мЈј мғқм„ұн•ҳкё°';
  }
}

document.getElementById('genBtn').addEventListener('click', generate);
</script>
